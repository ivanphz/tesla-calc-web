name: Deploy to Cloudflare Pages

on:
  # 允许在 GitHub Actions 页面手动点击按钮触发部署
  workflow_dispatch: 
  # (可选) 如果你想每次 push 代码也自动部署，可以取消下面两行的注释
  # push:
  #   branches: [ "main" ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Pages Project (if not exists)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        # 加上 -y 确保在没有本地依赖的情况下 npx 也能自动下载执行
        run: npx -y wrangler pages project create tesla-calc-web --production-branch main || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # public 是静态部署目录；--project-name 后面是 Cloudflare Pages 里的项目名，
          # 改项目名就改这一处（这是本仓库唯一写项目名的地方）。
          command: pages deploy public --project-name=tesla-calc-web
