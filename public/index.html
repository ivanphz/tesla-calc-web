<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特斯拉充电计算器</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --border: #e5e7eb;
            --warning-bg: #fffbeb;
            --warning-border: #f59e0b;
            --warning-text: #b45309;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.5; }
        
        /* 响应式布局：PC 左右，手机上下 */
        .container { display: flex; flex-direction: column; gap: 20px; max-width: 1000px; margin: 0 auto; }
        @media (min-width: 768px) { .container { flex-direction: row; align-items: flex-start; } }
        
        .panel { background: var(--card-bg); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); flex: 1; width: 100%; }
        h2 { margin-top: 0; margin-bottom: 20px; font-size: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        .control-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        
        /* 步进器 */
        .stepper { display: flex; align-items: center; gap: 8px; }
        .stepper button { width: 36px; height: 36px; border: 1px solid var(--border); background: #f9fafb; border-radius: 6px; font-size: 1.2rem; cursor: pointer; }
        .stepper input { width: 80px; height: 36px; text-align: center; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; }
        
        /* 滑块 */
        input[type="range"] { width: 100%; margin: 10px 0; }
        
        /* 快捷按钮 */
        .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .quick-btns button { padding: 6px 12px; border: 1px solid var(--border); background: white; border-radius: 16px; cursor: pointer; transition: 0.2s; font-size: 0.9rem;}
        .quick-btns button.active, .quick-btns button:hover { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* 时间选择 */
        .time-inputs { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .time-inputs input[type="time"] { padding: 6px; border: 1px solid var(--border); border-radius: 6px; }
        
        /* 主按钮 */
        .btn-calc { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-calc:hover { background: var(--primary-hover); }
        
        /* 结果展示 */
        .result-box { display: none; margin-top: 10px; }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--border); }
        .result-val { font-weight: bold; font-size: 1.1rem; color: var(--primary); }
        
        /* 警告状态 */
        .warning-box { display: none; background: var(--warning-bg); border: 1px solid var(--warning-border); padding: 16px; border-radius: 8px; margin-top: 10px; color: var(--warning-text); }
        .warning-box h4 { margin: 0 0 10px 0; display: flex; align-items: center; gap: 5px; }
        .warning-box ul { margin: 0; padding-left: 20px; }
        .warning-box li { margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 左侧：参数控制 -->
    <div class="panel">
        <h2>⚡ 充电参数设置</h2>
        
        <div class="control-group">
            <label>当前电量 (%)</label>
            <div class="stepper">
                <button type="button" onclick="adjustStart(-1)">-</button>
                <input type="number" id="start-battery" value="30" min="0" max="99">
                <button type="button" onclick="adjustStart(1)">+</button>
            </div>
        </div>

        <div class="control-group">
            <label>目标电量: <span id="target-val-display" style="color: var(--primary);">80%</span></label>
            <input type="range" id="target-slider" min="50" max="100" value="80" step="1" oninput="syncTarget(this.value)">
            <div class="quick-btns" id="target-presets">
                <button type="button" onclick="syncTarget(80)" class="active">80%</button>
                <button type="button" onclick="syncTarget(85)">85%</button>
                <button type="button" onclick="syncTarget(90)">90%</button>
                <button type="button" onclick="syncTarget(95)">95%</button>
                <button type="button" onclick="syncTarget(100)">100%</button>
            </div>
        </div>

        <div class="control-group">
            <label>充电时段</label>
            <div class="quick-btns">
                <button type="button" id="btn-time-night" onclick="setTimeSlot('22:00', '07:00', this)" class="active">谷电 (22:00-07:00)</button>
                <button type="button" id="btn-time-noon" onclick="setTimeSlot('11:00', '13:00', this)">午间 (11:00-13:00)</button>
                <button type="button" id="btn-time-now" onclick="setNowAsStart(this)">📍 从现在开始</button>
            </div>
            <div class="time-inputs">
                <input type="time" id="start-time" value="22:00">
                <span>至</span>
                <input type="time" id="end-time" value="07:00">
                <input type="hidden" id="use-now" value="false">
            </div>
        </div>

        <button class="btn-calc" onclick="calculate()">开始计算</button>
    </div>

    <!-- 右侧：计算结果 -->
    <div class="panel">
        <h2>📊 计算结果</h2>
        
        <div id="loading" style="display: none; text-align: center; padding: 20px;">计算中...</div>
        
        <div id="normal-result" class="result-box">
            <div class="result-item">
                <span>建议充电电流</span>
                <span class="result-val" id="res-current">-- A</span>
            </div>
            <div class="result-item">
                <span>预计充电时长</span>
                <span class="result-val" id="res-duration">-- 小时</span>
            </div>
            <div class="result-item">
                <span>有效充电功率</span>
                <span class="result-val" id="res-power">-- kW</span>
            </div>
            <div class="result-item">
                <span>线损比例</span>
                <span class="result-val" id="res-loss" style="color: #6b7280;">-- %</span>
            </div>
        </div>

        <div id="warning-result" class="warning-box">
            <h4>⚠️ 无法在设定时间内达成目标</h4>
            <p>按 32A 最大电流充电，当前时段内只能充至 <strong id="warn-reachable">--%</strong>。</p>
            <p>要达到目标，您需要：</p>
            <ul>
                <li>方案 A：提前至 <strong id="warn-early">--:--</strong> 开始充电（保持结束时间）。</li>
                <li>方案 B：延后至 <strong id="warn-late">--:--</strong> 结束充电（保持开始时间）。</li>
            </ul>
        </div>
    </div>
</div>

<script>
    function adjustStart(delta) {
        const input = document.getElementById('start-battery');
        let val = parseInt(input.value) + delta;
        if(val >= 0 && val < 100) input.value = val;
    }

    function syncTarget(val) {
        document.getElementById('target-slider').value = val;
        document.getElementById('target-val-display').innerText = val + '%';
        
        document.querySelectorAll('#target-presets button').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.innerText) === parseInt(val));
        });
    }

    function setTimeSlot(start, end, btn) {
        document.getElementById('start-time').value = start;
        document.getElementById('end-time').value = end;
        document.getElementById('use-now').value = 'false';
        updateTimeBtnUI(btn);
    }

    function setNowAsStart(btn) {
        document.getElementById('use-now').value = 'true';
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('start-time').value = `${hh}:${mm}`;
        updateTimeBtnUI(btn);
    }

    function updateTimeBtnUI(activeBtn) {
        document.getElementById('btn-time-night').classList.remove('active');
        document.getElementById('btn-time-noon').classList.remove('active');
        document.getElementById('btn-time-now').classList.remove('active');
        if (activeBtn) activeBtn.classList.add('active');
    }

    async function calculate() {
        const start = document.getElementById('start-battery').value;
        const target = document.getElementById('target-slider').value;
        const startTime = document.getElementById('start-time').value.split(':');
        const endTime = document.getElementById('end-time').value.split(':');
        const useNow = document.getElementById('use-now').value;

        const params = new URLSearchParams({
            start: start,
            target: target,
            use_now: useNow,
            start_hour: startTime[0],
            start_minute: startTime[1],
            end_hour: endTime[0],
            end_minute: endTime[1]
        });

        document.getElementById('normal-result').style.display = 'none';
        document.getElementById('warning-result').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        try {
            // 直接请求同域下的 Pages Function API
            const response = await fetch(`/api/charge?${params.toString()}`);
            const data = await response.json();
            document.getElementById('loading').style.display = 'none';

            if (data.result.error) {
                // 触发警告状态
                document.getElementById('warning-result').style.display = 'block';
                document.getElementById('warn-reachable').innerText = data.result.reachable_percentage.toFixed(1) + '%';
                document.getElementById('warn-early').innerText = data.result.early_start_time;
                document.getElementById('warn-late').innerText = data.result.late_end_time;
            } else {
                // 正常显示结果
                document.getElementById('normal-result').style.display = 'block';
                document.getElementById('res-current').innerText = data.result.optimal_current + ' A';
                document.getElementById('res-duration').innerText = data.result.charging_duration + ' 小时';
                document.getElementById('res-power').innerText = data.result.effective_power_kw + ' kW';
                document.getElementById('res-loss').innerText = data.result.loss_percentage + ' %';
            }
        } catch (error) {
            alert('计算出错，请检查网络或后端配置。');
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
